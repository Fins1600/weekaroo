name: Bug report
description: Report something broken in Weekaroo
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Weekaroo. Please do not include private calendar URLs, API keys, tokens, addresses, or screenshots with personal calendar data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Weekaroo with ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, browser/device"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
